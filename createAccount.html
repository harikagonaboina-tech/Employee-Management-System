<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Create Account</title>
</head>
<body style="height:100vh;display:flex;align-items:center;justify-content:center">
	<form action="create" method="post" style=" width:20vw;background-color:lightgray;text-align:center;border-radius:20px;padding:20px">
		<label>Employee Id : </label>
		<input type="text" name="id"><br><br>
		<label>Employee Name : </label>
		<input type="text" name="en"><br><br>
		<label>Address : </label>
		<input type="text" name="ad"><br><br>
		<label>Salary : </label>
		<input type="text" name="sal"><br><br>
		<label>Gender : </label>
		<input type="text" name="gn"><br><br>
		<label>Username :</label>
		<input type="text" name="un"><br><br>
		<label>Password :</label>
		<input type="password" name="pw"><br><br>
		<div style="display:flex;justify-content:space-evenly">
			<button style="font-size:20px;font-weight:bold;border-radius:10px" name="action" value="submit">Submit</button>
		    <button style="font-size:20px;font-weight:bold;border-radius:10px" name="action" value="login">login</button>
		</div>
	</form>
</body>
</html>
