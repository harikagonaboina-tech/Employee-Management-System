<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Login Form</title>
</head>
<body style="height:100vh;display:flex;align-items:center;justify-content:center">
	<form action="login" method="post" style="width:20vw;background-color:lightgray;border-radius:20px;text-align:center;padding:20px">
		<label>UserName : </label>
		<input type="text" name="un"><br><br>
		<label>Password : </label>
		<input type="text" name="pw"><br><br>
		<div style="display:flex;justify-content:space-evenly">
			<button style="font-size:20px;font-weight:bold;border-radius:10px" name="action" value="login">Login</button>
			<button style="font-size:20px;font-weight:bold;border-radius:10px" name="action" value="create">CreateAccount</button>
		</div>
	</form>
</body>
</html>
